<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Viết - Lưu Đình Mác</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Quill.js Theme CSS (for displaying formatting correctly) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .post-layout { max-width: 800px; margin: 120px auto 60px; padding: 0 20px; }
        
        .post-header { margin-bottom: 40px; text-align: center; }
        .post-title { font-size: 2.5rem; font-weight: 800; color: #1e293b; line-height: 1.3; margin-bottom: 20px; }
        .post-meta { display: flex; justify-content: center; align-items: center; gap: 15px; font-size: 1rem; color: #64748b; }
        .tag-category { background: #e0f2fe; color: #0284c7; padding: 4px 12px; border-radius: 20px; font-weight: 600; }
        
        .post-body { font-size: 1.15rem; line-height: 1.8; color: #334155; margin-bottom: 60px; }
        .post-body img { max-width: 100%; border-radius: 8px; margin: 20px 0; }
        
        .comments-section { border-top: 1px solid #e2e8f0; padding-top: 40px; }
        .comments-title { font-size: 1.5rem; margin-bottom: 30px; }
        
        .comment-form { background: #f8fafc; padding: 25px; border-radius: 12px; margin-bottom: 40px; }
        .comment-form .flex-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .comment-form input, .comment-form textarea {
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px;
            font-family: 'Inter', sans-serif;
        }
        .comment-form input:focus, .comment-form textarea:focus { outline: none; border-color: #2563eb; }
        .comment-form button {
            background: #2563eb; color: white; padding: 10px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.3s;
        }
        .comment-form button:hover { background: #1d4ed8; }
        
        .comment-list { display: flex; flex-direction: column; gap: 20px; }
        .comment-item { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; }
        .comment-author { font-weight: 600; font-size: 1.1rem; margin-bottom: 5px; color: #1e293b; }
        .comment-date { font-size: 0.85rem; color: #94a3b8; margin-bottom: 15px; }
        .comment-text { color: #475569; line-height: 1.5; }
    </style>
</head>
<body class="bg-color">

    <!-- Navbar -->
    <nav class="navbar scanned" id="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand"><img src="images/zero2ops.jpg" alt="Zero2Ops Logo" class="nav-logo"></a>
            <ul class="nav-links">
                <li><a href="/">Trang chủ</a></li>
                <li><a href="/blog">Blog</a></li>
            </ul>
        </div>
    </nav>

    <div class="post-layout">
        <div id="loading" style="text-align:center; padding: 50px;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        
        <article id="article" style="display:none;">
            <header class="post-header">
                <div class="post-meta" id="postMeta"></div>
                <h1 class="post-title" id="postTitle"></h1>
            </header>
            
            <div class="post-body ql-editor" id="postContent"></div>
        </article>
        
        <section class="comments-section" id="commentsSection" style="display:none;">
            <h3 class="comments-title">Bình Luận</h3>
            
            <div class="comment-form">
                <form id="formComment">
                    <div class="flex-row">
                        <input type="text" id="cName" placeholder="Tên của bạn *" required>
                        <input type="email" id="cEmail" placeholder="Email (không hiển thị công khai) *" required>
                    </div>
                    <textarea id="cBody" rows="4" placeholder="Nhập bình luận của bạn..." required></textarea>
                    <button type="submit" style="margin-top:15px;">Gửi Bình Luận</button>
                    <p id="cMsg" style="margin-top:10px; color: green; display:none;"></p>
                </form>
            </div>
            
            <div class="comment-list" id="commentList"></div>
        </section>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');
        
        function goBack() {
            window.location.href = '/blog';
        }

        if (!postId) {
            window.location.href = '/blog';
        }

        async function loadPost() {
            try {
                // Fetch Post
                const pRes = await fetch(`/api/posts/${postId}`);
                if (!pRes.ok) throw new Error("Not Found");
                const post = await pRes.json();
                
                document.getElementById('postTitle').textContent = post.title;
                document.title = post.title + " - Lưu Đình Mác";
                
                const date = new Date(post.created_at).toLocaleDateString('vi-VN');
                document.getElementById('postMeta').innerHTML = `
                    <span class="tag-category">${post.category}</span>
                    ${post.series ? `<span><i class="fas fa-layer-group"></i> ${post.series}</span>` : ''}
                    <span><i class="far fa-calendar-alt"></i> ${date}</span>
                `;
                
                document.getElementById('postContent').innerHTML = post.content;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('article').style.display = 'block';
                document.getElementById('commentsSection').style.display = 'block';
                
                loadComments();
            } catch (err) {
                document.getElementById('loading').innerHTML = '<h2 style="color:red;">Bài viết không tồn tại.</h2><br><a href="/blog">Quay lại Blog</a>';
            }
        }
        
        async function loadComments() {
            try {
                const cRes = await fetch(`/api/comments/${postId}`);
                const comments = await cRes.json();
                
                const list = document.getElementById('commentList');
                list.innerHTML = '';
                
                if (comments.length === 0) {
                    list.innerHTML = '<p>Chưa có bình luận nào. Hãy là người đầu tiên!</p>';
                    return;
                }
                
                comments.forEach(c => {
                    const cDate = new Date(c.created_at).toLocaleString('vi-VN');
                    list.insertAdjacentHTML('beforeend', `
                        <div class="comment-item">
                            <div class="comment-author">${c.author_name}</div>
                            <div class="comment-date">${cDate}</div>
                            <div class="comment-text">${c.content.replace(/</g, "&lt;")}</div>
                        </div>
                    `);
                });
            } catch(e) {}
        }
        
        document.getElementById('formComment').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            
            const payload = {
                post_id: parseInt(postId),
                author_name: document.getElementById('cName').value,
                author_email: document.getElementById('cEmail').value,
                content: document.getElementById('cBody').value
            };
            
            try {
                await fetch('/api/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                e.target.reset();
                const msg = document.getElementById('cMsg');
                msg.textContent = "Bình luận đã được gửi thành công!";
                msg.style.display = 'block';
                setTimeout(() => msg.style.display='none', 3000);
                
                loadComments();
            } catch(err) {}
            
            btn.disabled = false;
        });

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
