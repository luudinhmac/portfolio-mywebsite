<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Bài Viết - Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Header (inject via JS) -->
    <div id="admin-header"></div>

    <div class="admin-page">
        <main class="admin-content">

            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1><i class="fas fa-plus-circle" style="color:var(--primary);margin-right:10px;"></i>Tạo Bài Viết Mới</h1>
                    <p>Soạn và xuất bản bài viết mới lên blog.</p>
                </div>
                <div style="display:flex;gap:12px;align-items:center;">
                    <label for="wordFile" class="btn-import" id="importBtn">
                        <i class="fas fa-file-word"></i> Import từ Word
                    </label>
                    <input type="file" id="wordFile" accept=".docx">
                    <a href="/manage_posts" class="btn btn-secondary">
                        <i class="fas fa-arrow-left"></i> Quay lại
                    </a>
                </div>
            </div>

            <!-- Alert -->
            <div id="alertMsg" class="alert"></div>

            <!-- Form Card -->
            <div class="form-card">
                <form id="postForm">

                    <!-- Basic Info -->
                    <p class="form-section-title"><i class="fas fa-info-circle" style="margin-right:8px;color:var(--primary);"></i>Thông Tin Cơ Bản</p>

                    <div class="form-group">
                        <label for="title">Tiêu Đề Bài Viết <span class="required">*</span></label>
                        <input type="text" id="title" class="form-control" required
                            placeholder="Nhập tiêu đề bài viết...">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">Danh Mục <span class="required">*</span></label>
                            <select id="category" class="form-control" required>
                                <option value="">— Chọn danh mục —</option>
                                <option value="System">System</option>
                                <option value="DevOps">DevOps</option>
                                <option value="VMware">VMware</option>
                                <option value="Linux">Linux</option>
                                <option value="Cloud">Cloud</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="series">Series (Tùy chọn)</label>
                            <input type="text" id="series" class="form-control"
                                placeholder="VD: Kubernetes từ A-Z">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="isPinned">
                            <label for="isPinned">
                                <i class="fas fa-thumbtack" style="margin-right:6px;color:var(--warning);"></i>
                                Ghim bài viết lên đầu trang blog
                            </label>
                        </div>
                    </div>

                    <!-- Content -->
                    <p class="form-section-title" style="margin-top:28px;">
                        <i class="fas fa-pen-fancy" style="margin-right:8px;color:var(--primary);"></i>Nội Dung Bài Viết
                    </p>

                    <div class="form-group">
                        <div id="editor-container"></div>
                    </div>

                    <!-- Actions -->
                    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
                        <a href="/manage_posts" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Hủy
                        </a>
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-paper-plane"></i> Xuất Bản Ngay
                        </button>
                    </div>

                </form>
            </div>

        </main>
    </div>

    <!-- Footer (inject via JS) -->
    <div id="admin-footer"></div>

    <!-- Quill JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="/js/admin-layout.js"></script>
    <script>
        // ── Init Quill Editor ──────────────────────────────────
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Bắt đầu soạn nội dung bài viết...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'script': 'sub' }, { 'script': 'super' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // ── Import Word ────────────────────────────────────────
        document.getElementById('wordFile').addEventListener('change', async (e) => {
            if (!e.target.files.length) return;
            const importBtn = document.getElementById('importBtn');
            importBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';

            const formData = new FormData();
            formData.append('document', e.target.files[0]);

            try {
                const res = await fetch('/api/upload-word', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getToken()}` },
                    body: formData
                });
                const json = await res.json();
                if (res.ok) {
                    quill.root.innerHTML += json.html;
                    showAlert('alertMsg', 'Import file Word thành công!', 'success');
                } else {
                    showAlert('alertMsg', 'Lỗi import: ' + json.error, 'error');
                }
            } catch (err) {
                showAlert('alertMsg', 'Không thể kết nối đến máy chủ.', 'error');
            } finally {
                importBtn.innerHTML = '<i class="fas fa-file-word"></i> Import từ Word';
                e.target.value = '';
            }
        });

        // ── Submit Form ────────────────────────────────────────
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const content = quill.root.innerHTML;
            if (quill.getText().trim() === '') {
                showAlert('alertMsg', 'Nội dung bài viết không được để trống!', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xuất bản...';

            const payload = {
                title:     document.getElementById('title').value,
                category:  document.getElementById('category').value,
                series:    document.getElementById('series').value,
                is_pinned: document.getElementById('isPinned').checked,
                content
            };

            try {
                const res = await fetch('/api/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (res.ok) {
                    showAlert('alertMsg', 'Đã xuất bản bài viết thành công! Đang chuyển hướng...', 'success');
                    setTimeout(() => window.location.href = '/manage_posts', 1500);
                } else {
                    showAlert('alertMsg', 'Lỗi: ' + data.error, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Xuất Bản Ngay';
                }
            } catch (err) {
                showAlert('alertMsg', 'Không thể lưu bài viết. Thử lại sau.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Xuất Bản Ngay';
            }
        });
    </script>
</body>
</html>
