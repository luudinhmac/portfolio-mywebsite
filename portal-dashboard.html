<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viết Bài Mới - Admin Blog</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Quill.js Theme CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background-color: #f8fafc; padding-top: 80px; }
        .admin-container {
            max-width: 1000px; margin: 40px auto; padding: 30px;
            background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #1e293b; }
        .form-control {
            width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 1rem; font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .form-control:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .flex-row { display: flex; gap: 20px; }
        .flex-row .form-group { flex: 1; }
        
        #editor-container { height: 400px; border-radius: 0 0 8px 8px; }
        .ql-toolbar.ql-snow { border-radius: 8px 8px 0 0; border-color: #cbd5e1; }
        .ql-container.ql-snow { border-color: #cbd5e1; }
        
        .btn-submit {
            background: #2563eb; color: #fff; border: none; padding: 12px 30px;
            border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
            transition: background 0.3s;
        }
        .btn-submit:hover { background: #1d4ed8; }
        
        .btn-import {
            background: #10b981; color: #fff; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-import:hover { background: #059669; }
        
        input[type="file"] { display: none; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin-top: 15px; }
        .checkbox-group input { width: 18px; height: 18px; }
        
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: 500; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    
    <!-- Navbar -->
    <nav class="navbar scanned">
        <div class="nav-container">
            <a href="/" class="nav-brand"><img src="images/zero2ops.jpg" alt="Zero2Ops Logo" class="nav-logo"></a>
            <ul class="nav-links">
                <li><a href="/">Trang chủ</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="#" id="logoutBtn" style="color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a></li>
            </ul>
        </div>
    </nav>

    <div class="admin-container">
        <div id="alertMsg" class="alert"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2>Tạo Bài Viết Mới</h2>
            <div>
                <label for="wordFile" class="btn-import">
                    <i class="fas fa-file-word"></i> Import từ Word
                </label>
                <input type="file" id="wordFile" accept=".docx" />
            </div>
        </div>
        
        <form id="postForm">
            <div class="form-group">
                <label for="title">Tiêu Đề Bài Viết</label>
                <input type="text" id="title" class="form-control" required placeholder="Nhập tiêu đề...">
            </div>
            
            <div class="flex-row">
                <div class="form-group">
                    <label for="category">Thể Loại</label>
                    <select id="category" class="form-control" required>
                        <option value="">-- Chọn Thể Loại --</option>
                        <option value="System">System</option>
                        <option value="DevOps">DevOps</option>
                        <option value="VMware">VMWare</option>
                        <option value="Linux">Linux</option>
                        <option value="Cloud">Cloud</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="series">Series (Tùy chọn)</label>
                    <input type="text" id="series" class="form-control" placeholder="VD: Hướng dẫn Kubernetes từ A-Z">
                </div>
            </div>
            
            <div class="form-group checkbox-group">
                <input type="checkbox" id="isPinned">
                <label for="isPinned" style="margin:0;">Ghim Bài Viết Lên Đầu</label>
            </div>

            <div class="form-group">
                <label>Nội Dung</label>
                <div id="editor-container"></div>
            </div>

            <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Xuất Bản</button>
        </form>
    </div>

    <!-- Quill JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script>
        // Init Quill Editor
        var toolbarOptions = [
            [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            ['blockquote', 'code-block'],
            [{ 'list': 'ordered'}, { 'list': 'bullet' }],
            [{ 'script': 'sub'}, { 'script': 'super' }],
            [{ 'color': [] }, { 'background': [] }],
            ['link', 'image', 'video'],
            ['clean']
        ];
        
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: { toolbar: toolbarOptions }
        });

        const alertBox = document.getElementById("alertMsg");
        const showAlert = (msg, isSuccess) => {
            alertBox.textContent = msg;
            alertBox.style.display = "block";
            alertBox.className = "alert " + (isSuccess ? "alert-success" : "alert-error");
            if(isSuccess) setTimeout(() => alertBox.style.display = "none", 4000);
        };

        // Authentication Check
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/sys-login';
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('token');
            window.location.href = '/sys-login';
        });

        // Handle Word Upload
        document.getElementById('wordFile').addEventListener('change', async (e) => {
            if (!e.target.files.length) return;
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append('document', file);

            try {
                const res = await fetch('/api/upload-word', { 
                    method: 'POST', 
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData 
                });
                const json = await res.json();
                if (res.ok) {
                    quill.root.innerHTML += json.html;
                    showAlert("Import file Word thành công!", true);
                } else {
                    showAlert("Lỗi Import: " + json.error, false);
                }
            } catch (err) {
                showAlert("Không thể kết nối đến máy chủ", false);
            }
            e.target.value = ""; // reset
        });

        // Handle Submit
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                series: document.getElementById('series').value,
                is_pinned: document.getElementById('isPinned').checked,
                content: quill.root.innerHTML
            };

            if(quill.getText().trim() === "" && quill.root.innerHTML === "<p><br></p>") {
                showAlert("Nội dung không được để trống!", false);
                return;
            }

            try {
                const res = await fetch('/api/posts', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(res.ok) {
                    showAlert("Đã xuất bản bài viết thành công!", true);
                    document.getElementById('postForm').reset();
                    quill.root.innerHTML = "";
                    
                    // Redirect to blog
                    setTimeout(() => window.location.href = `/post?id=${data.id}`, 1000);
                } else {
                    showAlert("Lỗi: " + data.error, false);
                }
            } catch(err) {
                showAlert("Không thể lưu bài viết.", false);
            }
        });
    </script>
</body>
</html>
