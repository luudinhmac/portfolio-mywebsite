<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Bài Viết - Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Header (inject via JS) -->
    <div id="admin-header"></div>

    <div class="admin-page">
        <main class="admin-content">

            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1><i class="fas fa-pen" style="color:var(--primary);margin-right:10px;"></i>Sửa Bài Viết</h1>
                    <p id="postMeta" style="color:var(--text-muted);">Đang tải thông tin bài viết...</p>
                </div>
                <a href="/manage_posts" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </a>
            </div>

            <!-- Alert -->
            <div id="alertMsg" class="alert"></div>

            <!-- Loading State -->
            <div id="loadingState" class="form-card">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Đang tải dữ liệu bài viết...</p>
                </div>
            </div>

            <!-- Form Card (hidden until loaded) -->
            <div class="form-card" id="formCard" style="display:none;">
                <form id="postForm">

                    <!-- Basic Info -->
                    <p class="form-section-title">
                        <i class="fas fa-info-circle" style="margin-right:8px;color:var(--primary);"></i>Thông Tin Cơ Bản
                    </p>

                    <div class="form-group">
                        <label for="title">Tiêu Đề Bài Viết <span class="required">*</span></label>
                        <input type="text" id="title" class="form-control" required
                            placeholder="Nhập tiêu đề bài viết...">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="category">Danh Mục <span class="required">*</span></label>
                            <select id="category" class="form-control" required>
                                <option value="">— Chọn danh mục —</option>
                                <option value="System">System</option>
                                <option value="DevOps">DevOps</option>
                                <option value="VMware">VMware</option>
                                <option value="Linux">Linux</option>
                                <option value="Cloud">Cloud</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="series">Series (Tùy chọn)</label>
                            <input type="text" id="series" class="form-control"
                                placeholder="VD: Kubernetes từ A-Z">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="checkbox-row">
                            <input type="checkbox" id="isPinned">
                            <label for="isPinned">
                                <i class="fas fa-thumbtack" style="margin-right:6px;color:var(--warning);"></i>
                                Ghim bài viết lên đầu trang blog
                            </label>
                        </div>
                    </div>

                    <!-- Metadata -->
                    <div style="background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:22px;font-size:.85rem;color:var(--text-muted);display:flex;gap:24px;flex-wrap:wrap;">
                        <span><i class="fas fa-calendar-plus" style="margin-right:6px;"></i>Đăng lúc: <strong id="infoCreated">—</strong></span>
                        <span><i class="fas fa-rotate" style="margin-right:6px;"></i>Cập nhật lần cuối: <strong id="infoUpdated">—</strong></span>
                        <span><i class="fas fa-hashtag" style="margin-right:6px;"></i>Post ID: <strong id="infoId">—</strong></span>
                    </div>

                    <!-- Content -->
                    <p class="form-section-title">
                        <i class="fas fa-pen-fancy" style="margin-right:8px;color:var(--primary);"></i>Nội Dung Bài Viết
                    </p>

                    <div class="form-group">
                        <div id="editor-container"></div>
                    </div>

                    <!-- Actions -->
                    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap;">
                        <a href="/manage_posts" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Hủy
                        </a>
                        <a id="viewPostBtn" href="#" target="_blank" class="btn btn-secondary">
                            <i class="fas fa-external-link-alt"></i> Xem bài
                        </a>
                        <button type="submit" class="btn btn-success" id="submitBtn">
                            <i class="fas fa-save"></i> Lưu Thay Đổi
                        </button>
                    </div>

                </form>
            </div>

        </main>
    </div>

    <!-- Footer (inject via JS) -->
    <div id="admin-footer"></div>

    <!-- Quill JS -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="/js/admin-layout.js"></script>
    <script>
        // ── Init Quill Editor ──────────────────────────────────
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'script': 'sub' }, { 'script': 'super' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ]
            }
        });

        // ── Load Post Data ─────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('id');

        async function loadPost() {
            if (!postId) {
                showAlert('alertMsg', 'Không tìm thấy ID bài viết trong URL.', 'error');
                document.getElementById('loadingState').style.display = 'none';
                return;
            }

            try {
                const res = await fetch(`/api/posts/${postId}`);
                if (!res.ok) throw new Error('Post not found');
                const post = await res.json();

                // Populate form
                document.getElementById('title').value        = post.title || '';
                document.getElementById('category').value     = post.category || '';
                document.getElementById('series').value       = post.series || '';
                document.getElementById('isPinned').checked   = !!post.is_pinned;
                quill.root.innerHTML                          = post.content || '';

                // Metadata
                document.getElementById('infoId').textContent      = post.id;
                document.getElementById('infoCreated').textContent = formatDate(post.created_at);
                document.getElementById('infoUpdated').textContent = formatDate(post.updated_at);
                document.getElementById('postMeta').textContent    = `Đang sửa: "${post.title}"`;
                document.getElementById('viewPostBtn').href        = `/post?id=${post.id}`;
                document.title = `Sửa: ${post.title} - Admin`;

                // Show form
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('formCard').style.display = 'block';

            } catch (err) {
                document.getElementById('loadingState').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color:var(--danger);"></i>
                        <p>Không tìm thấy bài viết hoặc lỗi kết nối.</p>
                        <a href="/manage_posts" class="btn btn-secondary" style="margin-top:16px;">
                            <i class="fas fa-arrow-left"></i> Quay lại danh sách
                        </a>
                    </div>`;
            }
        }

        // ── Submit (Update) ────────────────────────────────────
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (quill.getText().trim() === '') {
                showAlert('alertMsg', 'Nội dung bài viết không được để trống!', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';

            const payload = {
                title:     document.getElementById('title').value,
                category:  document.getElementById('category').value,
                series:    document.getElementById('series').value,
                is_pinned: document.getElementById('isPinned').checked,
                content:   quill.root.innerHTML
            };

            try {
                const res = await fetch(`/api/posts/${postId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (res.ok) {
                    showAlert('alertMsg', 'Đã lưu thay đổi thành công! Đang chuyển hướng...', 'success');
                    setTimeout(() => window.location.href = '/manage_posts', 1500);
                } else {
                    showAlert('alertMsg', 'Lỗi: ' + data.error, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-save"></i> Lưu Thay Đổi';
                }
            } catch (err) {
                showAlert('alertMsg', 'Không thể kết nối đến máy chủ.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Lưu Thay Đổi';
            }
        });

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
